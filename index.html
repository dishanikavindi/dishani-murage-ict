<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Dishani Murage - ICT Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #000;
            overflow-x: hidden;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            position: relative;
        }

        /* Digital Grid Background */
        .tech-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(220, 38, 38, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(220, 38, 38, 0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: scrollGrid 15s linear infinite;
            z-index: 0;
        }

        @keyframes scrollGrid {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        /* Fast Moving Particles */
        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: moveParticles 2.5s infinite alternate ease-in-out;
        }

        @keyframes moveParticles {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(500px, -400px) scale(3); }
        }

        .neon-box {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .neon-box:hover {
            box-shadow: 0 0 60px rgba(220, 38, 38, 0.7);
            transform: translateY(-20px) scale(1.05);
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-zinc-100 flex relative">

    <div class="tech-grid"></div>

    <!-- Active particles -->
    <div class="particle" style="width: 500px; height: 500px; top: -10%; left: -5%; z-index: 1;"></div>
    <div class="particle" style="width: 400px; height: 400px; bottom: -10%; right: -5%; animation-delay: 1.2s; z-index: 1;"></div>

    <!-- Sidebar -->
    <aside class="w-64 bg-zinc-900/60 backdrop-blur-3xl p-6 border-r border-zinc-800 z-20">
        <h1 class="font-black text-xl mb-10 text-white tracking-widest animate-pulse">DISHANI MURAGE <br> ICT</h1>
        <nav class="space-y-4">
            <button onclick="showCategory('O/L Past Papers')" class="w-full text-left p-4 rounded-2xl bg-red-600/20 text-red-500 font-bold text-xs border border-red-900/50 hover:bg-red-600 hover:text-white transition-all duration-200">📚 O/L Past Papers</button>
            <button onclick="showCategory('Grade 6')" class="w-full text-left p-4 rounded-2xl text-zinc-400 hover:bg-zinc-800 transition-all duration-200 text-xs">📘 Grade 6</button>
            <button onclick="showCategory('Grade 7')" class="w-full text-left p-4 rounded-2xl text-zinc-400 hover:bg-zinc-800 transition-all duration-200 text-xs">📘 Grade 7</button>
            <button onclick="showCategory('Grade 8')" class="w-full text-left p-4 rounded-2xl text-zinc-400 hover:bg-zinc-800 transition-all duration-200 text-xs">📘 Grade 8</button>
            <button onclick="showCategory('Grade 9')" class="w-full text-left p-4 rounded-2xl text-zinc-400 hover:bg-zinc-800 transition-all duration-200 text-xs">📘 Grade 9</button>
            <button onclick="showCategory('Grade 10')" class="w-full text-left p-4 rounded-2xl text-zinc-400 hover:bg-zinc-800 transition-all duration-200 text-xs">📘 Grade 10</button>
            <button onclick="showQuiz()" class="w-full text-left p-4 rounded-2xl text-zinc-400 hover:bg-zinc-800 transition-all duration-200 text-xs">🎮 Quiz Module</button>
        </nav>
    </aside>

    <!-- Content -->
    <main class="flex-grow p-10 z-20">
        <h2 id="page-title" class="text-5xl font-black mb-10 text-white fade-in drop-shadow-2xl ">O/L Past Papers</h2>
        <div id="content-container" class="grid grid-cols-4 gap-4">
    <!-- Content loads here -->
</div>
    </main>

    <footer class="w-full text-center p-6 border-t border-zinc-800 mt-10">
    <p class="text-zinc-500 text-sm">
        &copy; Copyright Dishani Murage ICT. All Rights Reserved.
    </p>
    <p class="text-zinc-600 text-xs mt-1">
        Designed by Dishani Murage
    </p>
    </footer>

    <script>
        const olYears = ['2016 O/L', '2017 O/L', '2018 O/L', '2019 O/L', '2020 O/L', '2021 O/L', '2022 O/L', '2023 O/L', '2024 O/L', '2025 O/L'];
        
        function showCategory(category) {
            document.getElementById('page-title').innerText = category;
            const container = document.getElementById('content-container');
            
            if (category === 'O/L Past Papers') {
                container.innerHTML = olYears.map(year => `
                    <div class="neon-box bg-zinc-900/70 backdrop-blur-xl p-8 rounded-[2rem] border border-zinc-700 text-center cursor-pointer">
                        <span class="block text-4xl font-black mb-4 text-white">${year}</span>
                        <button onclick="openYearDetails('${year}')" class="w-full py-3 bg-red-600 hover:bg-white hover:text-red-600 text-white rounded-2xl text-xs font-bold transition-all duration-200">View Files</button>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<p class='text-zinc-500 italic'>Content for ${category} will be added soon...</p>`;
            }
        }

        function openYearDetails(year) {
            document.getElementById('page-title').innerText = year + " O/L Details";
            document.getElementById('content-container').innerHTML = `
                <div class="col-span-full fade-in">
                    <button onclick="showCategory('O/L Past Papers')" class="text-red-500 hover:text-white font-bold mb-6 flex items-center gap-2 transform hover:translate-x-[-10px] transition-all">← Back to Papers</button>
                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="neon-box bg-zinc-900/90 p-10 rounded-[2rem] border border-zinc-700">
                            <h3 class="text-2xl font-bold mb-6 text-white">Past Paper</h3>
                            <button class="w-full py-5 bg-red-600 hover:bg-white hover:text-red-600 text-white rounded-2xl font-bold transition-all">Download PDF</button>
                        </div>
                        <div class="neon-box bg-zinc-900/90 p-10 rounded-[2rem] border border-zinc-700">
                            <h3 class="text-2xl font-bold mb-6 text-white">Marking Scheme</h3>
                            <button class="w-full py-5 bg-red-600 hover:bg-white hover:text-red-600 text-white rounded-2xl font-bold transition-all">Download PDF</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function showQuiz() {
            document.getElementById('page-title').innerText = "Quiz Module";
            document.getElementById('content-container').innerHTML = "<p class='text-zinc-500 italic animate-pulse'>Quiz Module coming soon...</p>";
        }

        window.onload = () => showCategory('O/L Past Papers');
    </script>

    <footer class="w-full text-center p-6 border-t border-zinc-800 mt-10">
    <p class="text-zinc-500 text-sm">
        &copy; Copyright Dishani Murage ICT. All Rights Reserved.
    </p>
    <p class="text-zinc-600 text-xs mt-1">
        Designed by Dishani Murage
    </p>
    </footer>
</body>
</html>
