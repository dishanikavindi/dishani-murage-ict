<!DOCTYPE html>
<html lang="si" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dishani Murage - ICT Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <style>
        body { background: #000; color: #fff; transition: background 0.3s; font-family: 'Segoe UI', sans-serif; }
        .neon-box { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .neon-box:hover { box-shadow: 0 0 30px rgba(220, 38, 38, 0.5); transform: translateY(-10px); }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="md:hidden p-4 bg-zinc-900 border-b border-zinc-800 flex justify-between items-center z-50">
        <h1 class="font-bold text-sm">DISHANI MURAGE ICT</h1>
        <button onclick="toggleMenu()" class="text-xl">☰</button>
    </nav>

    <div class="flex flex-grow">
        <aside id="sidebar" class="hidden md:block w-64 bg-zinc-900/90 p-6 border-r border-zinc-800 z-50 fixed md:relative h-full">
            <h1 class="font-black text-lg mb-8 text-white tracking-widest">DISHANI MURAGE <br> ICT</h1>
            
            <input type="text" id="searchInput" onkeyup="searchContent()" placeholder="🔍 Search years..." class="w-full p-3 mb-6 bg-zinc-800 rounded-xl text-sm outline-none border border-zinc-700 focus:border-red-600 transition">

            <nav class="space-y-2">
                <button onclick="showCategory('O/L Past Papers')" class="w-full text-left p-4 rounded-xl bg-red-600 text-white font-bold text-sm hover:opacity-80 transition">📚 O/L Past Papers</button>
                <button onclick="showCategory('Grades 6-10')" class="w-full text-left p-4 rounded-xl hover:bg-zinc-800 text-zinc-400 text-sm transition">📘 Grades 6-10</button>
            </nav>

            <button onclick="toggleTheme()" class="mt-10 w-full p-3 bg-zinc-800 rounded-xl text-xs hover:bg-zinc-700">🌓 Toggle Dark/Light</button>
        </aside>

        <main class="flex-grow p-6 md:p-10">
            <h2 id="page-title" class="text-3xl md:text-5xl font-black mb-8">O/L ICT Past Papers</h2>
            <div id="content-container" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                </div>
        </main>
    </div>

    <footer class="w-full text-center py-6 border-t border-zinc-800">
        <p class="text-zinc-500 text-xs">&copy; Copyright Dishani Murage ICT. All Rights Reserved.</p>
    </footer>

    <script>
        const olYears = ['2016', '2017', '2018', '2019', '2020', '2021', '2022', '2023', '2024', '2025'];

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('hidden'); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }

        function showCategory(category) {
            const container = document.getElementById('content-container');
            container.innerHTML = `<p class="animate-pulse">Loading content...</p>`;
            
            setTimeout(() => {
                if (category === 'O/L Past Papers') {
                    document.getElementById('page-title').innerText = "O/L ICT Past Papers";
                    container.innerHTML = olYears.map(year => `
                        <div class="neon-box bg-zinc-900 p-6 rounded-2xl border border-zinc-700 text-center">
                            <span class="block text-lg font-black mb-4">${year} O/L</span>
                            <button onclick="openDetails('${year}')" class="w-full py-4 bg-red-600 hover:opacity-70 rounded-xl text-xs font-bold transition">View Files</button>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('page-title').innerText = category;
                    container.innerHTML = `
                        <div class="col-span-full flex justify-center items-center h-64 text-center">
                            <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800">
                                <h3 class="text-2xl font-bold text-white mb-2">Coming Soon!</h3>
                                <p class="text-zinc-400">Lessons for ${category} are currently being prepared and will be added very soon.</p>
                            </div>
                        </div>
                    `;
                }
            }, 300);
        }

        function openDetails(year) {
            document.getElementById('page-title').innerText = year + " Paper Details";
            document.getElementById('content-container').innerHTML = `
                <div class="col-span-full fade-in">
                    <button onclick="showCategory('O/L Past Papers')" class="text-red-500 font-bold mb-6">← Back</button>
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class
